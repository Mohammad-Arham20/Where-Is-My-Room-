<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Where Is My Room ?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css?v=20260413-mobile14" />
  </head>
  <body data-page="dashboard">
    <div class="header-shell">
      <button class="nav-back-btn glass-card" data-nav-back type="button">Back</button>
      <a href="/" class="brand-mark" aria-label="Where Is My Room ?">
        <span class="brand-icon" aria-hidden="true"></span>
        <span class="brand-text">
          <span>Where Is</span>
          <span>My Room ?</span>
        </span>
      </a>
      <header class="site-header glass-card">
      <nav class="nav-links">
        <a href="/" class="nav-link">Home</a>
        <a href="/post" class="nav-link">Post</a>
        <a href="/dashboard" class="nav-link active">Dashboard</a>
        <a href="/chats.html" class="nav-link">Chats</a>
        <a href="/favorites.html" class="nav-link">My Favorites</a>
      </nav>
      <div class="nav-actions">
        <button class="user-chip hidden" data-auth-user data-open-profile type="button"></button>
        <button class="btn btn-secondary auth-login-btn" data-open-auth data-auth-tab="login">
          Login / Register
        </button>
        <button class="btn btn-ghost auth-logout-btn hidden" data-auth-action="logout">
          Logout
        </button>
      </div>
      </header>
    </div>

    <main class="page-shell">
      <section class="section-header">
        <div>
          <span class="eyebrow">Your workspace</span>
          <h1 id="dashboardGreeting">Dashboard</h1>
        </div>
        <p id="dashboardSubtitle">Track active listings and roommate compatibility.</p>
      </section>

      <section id="dashboardAuthState" class="glass-card auth-state-card loading-shell">
        Loading dashboard...
      </section>

      <section id="dashboardContent" class="hidden">
        <div class="stats-grid" id="statsGrid"></div>

        <div class="glass-card dashboard-tabs">
          <div class="tab-bar">
            <button class="tab-btn active" data-dashboard-tab="overview">Overview</button>
            <button class="tab-btn" data-dashboard-tab="listings">My Listings</button>
            <button class="tab-btn" data-dashboard-tab="roommates">Roommates</button>
          </div>

          <div id="overviewPanel" class="tab-panel active"></div>
          <div id="listingsPanel" class="tab-panel"></div>
          <div id="roommatesPanel" class="tab-panel"></div>
        </div>
      </section>
    </main>

    <div class="modal-backdrop" id="authModal">
      <div class="modal-panel glass-card">
        <button class="modal-close" data-close-modal="authModal" aria-label="Close authentication modal">
          x
        </button>
        <div class="modal-header">
          <span class="eyebrow">Access your account</span>
          <h3>Open your dashboard</h3>
        </div>
        <div class="auth-toggle">
          <button class="tab-btn active" data-auth-tab="login">Login</button>
          <button class="tab-btn" data-auth-tab="register">Register</button>
        </div>

        <form id="loginForm" class="auth-form active">
          <label class="field-group">
            <span>Email</span>
            <input type="email" name="email" placeholder="student@example.com" required />
          </label>
          <label class="field-group">
            <span>Password</span>
            <input type="password" name="password" placeholder="Minimum 6 characters" required />
          </label>
          <button class="btn btn-primary btn-block" type="submit">Login</button>
        </form>

        <form id="registerForm" class="auth-form">
          <label class="field-group">
            <span>Name</span>
            <input type="text" name="name" placeholder="Your full name" required />
          </label>
          <label class="field-group">
            <span>Email</span>
            <input type="email" name="email" placeholder="student@example.com" required />
          </label>
          <label class="field-group">
            <span>Password</span>
            <input type="password" name="password" placeholder="Minimum 6 characters" required />
          </label>
          <button class="btn btn-primary btn-block" type="submit">Create account</button>
        </form>
      </div>
    </div>

    <div class="toast-stack" id="toastContainer"></div>

    <script src="/script.js?v=20260413-mobile14"></script>
  </body>
</html>
