<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chats | Where Is My Room ?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css?v=20260413-mobile14" />
  </head>
  <body data-page="chats">
    <div class="header-shell">
      <button class="nav-back-btn glass-card" data-nav-back type="button">Back</button>
      <a href="/" class="brand-mark" aria-label="Where Is My Room ?">
        <span class="brand-icon" aria-hidden="true"></span>
        <span class="brand-text">
          <span>Where Is</span>
          <span>My Room ?</span>
        </span>
      </a>
      <header class="site-header glass-card">
      <nav class="nav-links">
          <a href="/" class="nav-link">Home</a>
          <a href="/post" class="nav-link">Post</a>
          <a href="/dashboard" class="nav-link">Dashboard</a>
          <a href="/chats.html" class="nav-link active">Chats</a>
          <a href="/favorites.html" class="nav-link">My Favorites</a>
        </nav>
        <div class="nav-actions">
          <button class="user-chip hidden" data-auth-user data-open-profile type="button"></button>
          <button class="btn btn-secondary auth-login-btn" data-open-auth data-auth-tab="login">
            Login / Register
          </button>
          <button class="btn btn-ghost auth-logout-btn hidden" data-auth-action="logout">
            Logout
          </button>
        </div>
      </header>
    </div>

    <main class="page-shell">
      <section class="section-header">
        <div>
          <span class="eyebrow">Student messaging</span>
          <h1>Your Chats</h1>
        </div>
        <p>Talk directly with PG listers and keep separate conversations in one place.</p>
      </section>

      <section id="chatsAuthState" class="glass-card auth-state-card loading-shell">
        Loading your chats...
      </section>

      <section id="chatsContent" class="hidden">
        <div class="chat-layout chat-layout-idle" id="chatLayout">
          <aside class="glass-card chat-sidebar">
            <div class="chat-sidebar-head">
              <span class="eyebrow">Conversations</span>
              <p id="chatThreadCount">0 chats</p>
            </div>
            <div id="chatThreadList" class="chat-thread-list"></div>
          </aside>

          <section class="glass-card chat-main">
            <div id="chatEmptyState" class="empty-state">
              <h3>No chats selected</h3>
              <p>Select a chat to see and talk.</p>
            </div>

            <div id="chatActiveView" class="chat-active-view hidden">
              <div id="chatHeader" class="chat-header"></div>
              <div id="chatMessages" class="chat-messages"></div>
              <form id="chatComposerForm" class="chat-composer">
                <label class="field-group">
                  <span>Message</span>
                  <textarea
                    id="chatInput"
                    rows="2"
                    maxlength="1200"
                    placeholder="Type your message..."
                    required
                  ></textarea>
                </label>
                <button class="btn btn-primary" id="chatSendBtn" type="submit">Send</button>
              </form>
            </div>
          </section>
        </div>
      </section>
    </main>

    <div class="modal-backdrop" id="authModal">
      <div class="modal-panel glass-card">
        <button class="modal-close" data-close-modal="authModal" aria-label="Close authentication modal">
          x
        </button>
        <div class="modal-header">
          <span class="eyebrow">Access your account</span>
          <h3>Open your chats</h3>
        </div>
        <div class="auth-toggle">
          <button class="tab-btn active" data-auth-tab="login">Login</button>
          <button class="tab-btn" data-auth-tab="register">Register</button>
        </div>

        <form id="loginForm" class="auth-form active">
          <label class="field-group">
            <span>Email</span>
            <input type="email" name="email" placeholder="student@example.com" required />
          </label>
          <label class="field-group">
            <span>Password</span>
            <input type="password" name="password" placeholder="Minimum 6 characters" required />
          </label>
          <button class="btn btn-primary btn-block" type="submit">Login</button>
        </form>

        <form id="registerForm" class="auth-form">
          <label class="field-group">
            <span>Name</span>
            <input type="text" name="name" placeholder="Your full name" required />
          </label>
          <label class="field-group">
            <span>Email</span>
            <input type="email" name="email" placeholder="student@example.com" required />
          </label>
          <label class="field-group">
            <span>Password</span>
            <input type="password" name="password" placeholder="Minimum 6 characters" required />
          </label>
          <button class="btn btn-primary btn-block" type="submit">Create account</button>
        </form>
      </div>
    </div>

    <div class="toast-stack" id="toastContainer"></div>

    <script src="/script.js?v=20260413-mobile14"></script>
  </body>
</html>
